name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest + svelte-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: svelte-kit sync (generates .svelte-kit/tsconfig.json)
        run: pnpm exec svelte-kit sync

      - name: vitest
        run: pnpm test

      - name: svelte-check (type + a11y)
        run: pnpm check
        continue-on-error: true   # type errors land as PR comments, don't block CI yet

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: install playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: build
        run: pnpm build

      - name: e2e
        run: pnpm test:e2e
        env:
          CI: 'true'
